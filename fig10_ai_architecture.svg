<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="'Malgun Gothic', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="white"/>
    </marker>
  </defs>

  <text x="425" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">【도 10】 AI 기계학습 보정 시스템 아키텍처</text>

  <!-- ====== INPUT LAYER ====== -->
  <text x="90" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">입력 데이터</text>

  <!-- Input 1: Z1 -->
  <rect x="20" y="75" width="140" height="40" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="90" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#E74C3C">Z₁ (R₁, X₁)</text>
  <text x="90" y="108" text-anchor="middle" font-size="8" fill="#C0392B">f₁ 저주파 임피던스</text>

  <!-- Input 2: Z2 -->
  <rect x="20" y="125" width="140" height="40" rx="6" fill="#D6EAF8" stroke="#3498DB" stroke-width="1.5"/>
  <text x="90" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498DB">Z₂ (R₂, X₂)</text>
  <text x="90" y="158" text-anchor="middle" font-size="8" fill="#2980B9">f₂ 고주파 임피던스</text>

  <!-- Input 3: Temp -->
  <rect x="20" y="175" width="140" height="35" rx="6" fill="#FDEBD0" stroke="#D4AC0D" stroke-width="1.5"/>
  <text x="90" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#B7950B">환경 온도 (°C)</text>

  <!-- Input 4: Humidity -->
  <rect x="20" y="220" width="140" height="35" rx="6" fill="#FDEBD0" stroke="#D4AC0D" stroke-width="1.5"/>
  <text x="90" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#B7950B">환경 습도 (%RH)</text>

  <!-- Input 5: Skin type -->
  <rect x="20" y="265" width="140" height="35" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="90" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#8E44AD">피부 타입</text>

  <!-- Input 6: Body part -->
  <rect x="20" y="310" width="140" height="35" rx="6" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="90" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#8E44AD">측정 부위</text>

  <!-- ====== FEATURE ENGINEERING ====== -->
  <rect x="210" y="75" width="150" height="280" rx="10" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="285" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#F57F17">특징 추출</text>
  <line x1="225" y1="110" x2="345" y2="110" stroke="#F9A825" stroke-width="1"/>

  <text x="285" y="135" text-anchor="middle" font-size="9" fill="#555">|Z₁|, |Z₂|</text>
  <text x="285" y="155" text-anchor="middle" font-size="9" fill="#555">θ₁, θ₂ (위상각)</text>
  <text x="285" y="175" text-anchor="middle" font-size="9" fill="#555">ΔR = R₁-R₂</text>
  <text x="285" y="195" text-anchor="middle" font-size="9" fill="#555">ΔX = X₁-X₂</text>
  <text x="285" y="215" text-anchor="middle" font-size="9" fill="#555">R₁/R₂ 비율</text>
  <text x="285" y="235" text-anchor="middle" font-size="9" fill="#555">X₁/X₂ 비율</text>
  <text x="285" y="260" text-anchor="middle" font-size="9" fill="#555">온도 보정 계수</text>
  <text x="285" y="280" text-anchor="middle" font-size="9" fill="#555">습도 보정 계수</text>
  <text x="285" y="305" text-anchor="middle" font-size="9" fill="#555">피부타입 인코딩</text>
  <text x="285" y="325" text-anchor="middle" font-size="9" fill="#555">부위 인코딩</text>
  <text x="285" y="348" text-anchor="middle" font-size="8" font-weight="bold" fill="#F57F17">→ 총 12+ 특징</text>

  <!-- Arrows: inputs to feature -->
  <line x1="160" y1="95" x2="210" y2="130" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="145" x2="210" y2="165" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="192" x2="210" y2="240" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="237" x2="210" y2="260" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="282" x2="210" y2="300" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="327" x2="210" y2="320" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ====== ML MODEL ====== -->
  <rect x="410" y="100" width="170" height="230" rx="12" fill="#2E86C1" stroke="#1B4F72" stroke-width="2"/>
  <text x="495" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">기계학습 모델</text>
  <line x1="425" y1="140" x2="565" y2="140" stroke="white" stroke-width="0.8" opacity="0.5"/>

  <!-- Neural network representation -->
  <!-- Layer 1 -->
  <circle cx="445" cy="175" r="8" fill="white" opacity="0.8"/>
  <circle cx="445" cy="200" r="8" fill="white" opacity="0.8"/>
  <circle cx="445" cy="225" r="8" fill="white" opacity="0.8"/>
  <circle cx="445" cy="250" r="8" fill="white" opacity="0.8"/>
  <circle cx="445" cy="275" r="8" fill="white" opacity="0.8"/>

  <!-- Layer 2 -->
  <circle cx="495" cy="185" r="8" fill="white" opacity="0.6"/>
  <circle cx="495" cy="215" r="8" fill="white" opacity="0.6"/>
  <circle cx="495" cy="245" r="8" fill="white" opacity="0.6"/>
  <circle cx="495" cy="275" r="8" fill="white" opacity="0.6"/>

  <!-- Layer 3 -->
  <circle cx="545" cy="200" r="8" fill="white" opacity="0.4"/>
  <circle cx="545" cy="235" r="8" fill="white" opacity="0.4"/>
  <circle cx="545" cy="270" r="8" fill="white" opacity="0.4"/>

  <!-- Connections (some) -->
  <line x1="453" y1="175" x2="487" y2="185" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="453" y1="200" x2="487" y2="215" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="453" y1="225" x2="487" y2="245" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="453" y1="250" x2="487" y2="275" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="503" y1="215" x2="537" y2="235" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <line x1="503" y1="245" x2="537" y2="270" stroke="white" stroke-width="0.5" opacity="0.4"/>

  <text x="495" y="310" text-anchor="middle" font-size="9" fill="white">Random Forest /</text>
  <text x="495" y="322" text-anchor="middle" font-size="9" fill="white">Gradient Boosting</text>

  <!-- Arrow: feature to model -->
  <line x1="360" y1="215" x2="410" y2="215" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== OUTPUT LAYER ====== -->
  <line x1="580" y1="190" x2="630" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="250" x2="630" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output 1: Surface moisture -->
  <rect x="630" y="115" width="190" height="65" rx="10" fill="#D6EAF8" stroke="#3498DB" stroke-width="2"/>
  <text x="725" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E86C1">겉보습 지표</text>
  <text x="725" y="158" text-anchor="middle" font-size="10" fill="#3498DB">(각질층 수분도)</text>
  <text x="725" y="174" text-anchor="middle" font-size="9" fill="#2980B9">0~100 AU</text>

  <!-- Output 2: Deep moisture -->
  <rect x="630" y="250" width="190" height="65" rx="10" fill="#FADBD8" stroke="#E74C3C" stroke-width="2"/>
  <text x="725" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#E74C3C">속보습 지표</text>
  <text x="725" y="293" text-anchor="middle" font-size="10" fill="#E74C3C">(진피층 수분도)</text>
  <text x="725" y="309" text-anchor="middle" font-size="9" fill="#C0392B">0~100 AU</text>

  <!-- ====== TRAINING FLOW (bottom) ====== -->
  <rect x="80" y="390" width="690" height="115" rx="10" fill="#F8F9FA" stroke="#AAA" stroke-width="1.5"/>
  <text x="425" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">학습 파이프라인 (Training)</text>
  <line x1="100" y1="425" x2="750" y2="425" stroke="#DDD" stroke-width="1"/>

  <!-- Training steps -->
  <rect x="100" y="435" width="120" height="50" rx="6" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="160" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#229954">Corneometer</text>
  <text x="160" y="470" text-anchor="middle" font-size="9" fill="#229954">기준값 수집</text>
  <text x="160" y="482" text-anchor="middle" font-size="8" fill="#27AE60">(Ground Truth)</text>

  <line x1="220" y1="460" x2="250" y2="460" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="435" width="120" height="50" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="310" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E86C1">SkinSense</text>
  <text x="310" y="470" text-anchor="middle" font-size="9" fill="#2E86C1">동시 측정</text>
  <text x="310" y="482" text-anchor="middle" font-size="8" fill="#2980B9">(Z₁, Z₂ 수집)</text>

  <line x1="370" y1="460" x2="400" y2="460" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="435" width="120" height="50" rx="6" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="460" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#E67E22">데이터 정합</text>
  <text x="460" y="470" text-anchor="middle" font-size="9" fill="#E67E22">(특징-기준값 쌍)</text>
  <text x="460" y="482" text-anchor="middle" font-size="8" fill="#E67E22">N ≥ 200 샘플</text>

  <line x1="520" y1="460" x2="550" y2="460" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="550" y="435" width="100" height="50" rx="6" fill="#F5EEF8" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="600" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#8E44AD">모델 학습</text>
  <text x="600" y="470" text-anchor="middle" font-size="9" fill="#8E44AD">5-fold CV</text>

  <line x1="650" y1="460" x2="680" y2="460" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="680" y="435" width="80" height="50" rx="6" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="720" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#229954">검증</text>
  <text x="720" y="470" text-anchor="middle" font-size="9" fill="#229954">R²≥0.85</text>

  <!-- vs NDT comparison -->
  <rect x="100" y="360" width="300" height="24" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="250" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#C0392B">cf. NDT: 80개 고정 교정커브 → SkinSense: AI 적응적 보정</text>
</svg>
