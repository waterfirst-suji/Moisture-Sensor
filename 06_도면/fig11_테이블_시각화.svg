<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="'Malgun Gothic', 'Noto Sans KR', sans-serif">
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">【도 11】 표 1 시각화: 주파수별 침투 깊이 계산 결과</text>
  <text x="375" y="48" text-anchor="middle" font-size="10" fill="#888">δ = 1/√(πfμσ), σ = 0.1 S/m, μ = 4π×10⁻⁷ H/m</text>

  <!-- Table -->
  <rect x="50" y="65" width="650" height="45" fill="#2E86C1" rx="6" ry="0"/>
  <text x="140" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">주파수</text>
  <text x="290" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">침투 깊이 δ</text>
  <text x="450" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">대응 피부층</text>
  <text x="620" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="white">측정 대상</text>
  <line x1="215" y1="65" x2="215" y2="310" stroke="#D0D0D0" stroke-width="1"/>
  <line x1="370" y1="65" x2="370" y2="310" stroke="#D0D0D0" stroke-width="1"/>
  <line x1="530" y1="65" x2="530" y2="310" stroke="#D0D0D0" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="50" y="110" width="650" height="50" fill="#FEF9E7" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="140" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">100 kHz</text>
  <text x="290" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#E74C3C">1.6 mm</text>
  <text x="290" y="152" text-anchor="middle" font-size="9" fill="#999">(1,600 μm)</text>
  <text x="450" y="140" text-anchor="middle" font-size="11" fill="#555">진피층 전체</text>
  <rect x="565" y="127" width="110" height="22" rx="4" fill="#E74C3C" opacity="0.2"/>
  <text x="620" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0392B">속보습(깊은)</text>

  <!-- Row 2 -->
  <rect x="50" y="160" width="650" height="50" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="140" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1 MHz</text>
  <text x="290" y="185" text-anchor="middle" font-size="15" font-weight="bold" fill="#E74C3C">0.5 mm</text>
  <text x="290" y="202" text-anchor="middle" font-size="9" fill="#999">(500 μm)</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#555">표피~진피 상부</text>
  <rect x="565" y="177" width="110" height="22" rx="4" fill="#E74C3C" opacity="0.15"/>
  <text x="620" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0392B">속보습</text>

  <!-- Row 3 -->
  <rect x="50" y="210" width="650" height="50" fill="#FEF9E7" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="140" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">10 MHz</text>
  <text x="290" y="235" text-anchor="middle" font-size="15" font-weight="bold" fill="#8E44AD">0.16 mm</text>
  <text x="290" y="252" text-anchor="middle" font-size="9" fill="#999">(160 μm)</text>
  <text x="450" y="240" text-anchor="middle" font-size="11" fill="#555">표피층</text>
  <rect x="565" y="227" width="110" height="22" rx="4" fill="#8E44AD" opacity="0.15"/>
  <text x="620" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="#8E44AD">중간층</text>

  <!-- Row 4 -->
  <rect x="50" y="260" width="650" height="50" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="140" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">100 MHz</text>
  <text x="290" y="285" text-anchor="middle" font-size="15" font-weight="bold" fill="#3498DB">0.05 mm</text>
  <text x="290" y="302" text-anchor="middle" font-size="9" fill="#999">(50 μm)</text>
  <text x="450" y="290" text-anchor="middle" font-size="11" fill="#555">각질층</text>
  <rect x="565" y="277" width="110" height="22" rx="4" fill="#3498DB" opacity="0.15"/>
  <text x="620" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E86C1">겉보습(얕은)</text>

  <rect x="50" y="310" width="650" height="1" fill="#333"/>

  <!-- Visual bar representation -->
  <text x="375" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">침투 깊이 비교 (로그 스케일 바)</text>
  <rect x="100" y="350" width="520" height="14" rx="3" fill="#E74C3C" opacity="0.3"/>
  <text x="625" y="362" font-size="9" fill="#E74C3C">100kHz: 1.6mm</text>
  <rect x="100" y="368" width="320" height="14" rx="3" fill="#E74C3C" opacity="0.4"/>
  <text x="425" y="380" font-size="9" fill="#E74C3C">1MHz: 0.5mm</text>
  <rect x="100" y="386" width="140" height="14" rx="3" fill="#8E44AD" opacity="0.4"/>
  <text x="245" y="398" font-size="9" fill="#8E44AD">10MHz: 0.16mm</text>
  <rect x="100" y="404" width="50" height="14" rx="3" fill="#3498DB" opacity="0.5"/>
  <text x="155" y="416" font-size="9" fill="#3498DB">100MHz: 0.05mm</text>
</svg>
